name: Daily Contribution

on:
  schedule:
    - cron: '0 12 * * *'  # Runs at 12:00 UTC every day (19:00 WIB)
  workflow_dispatch:  # Allow manual trigger

jobs:
  contribute:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Generate daily content
        run: |
          TODAY=$(date +"%Y-%m-%d")
          DAY_NUM=$(date +"%j")
          YEAR=$(date +"%Y")
          MONTH=$(date +"%B")

          # Get total commits so far
          TOTAL=$(git rev-list --count HEAD 2>/dev/null || echo "0")
          TOTAL=$((TOTAL + 1))

          # Fun coding tips
          TIPS=(
            "Always write tests before writing code. TDD helps you think about edge cases early."
            "Use meaningful variable names. code is read more often than it is written."
            "Keep functions small and focused. One function = one job."
            "Don't repeat yourself (DRY). If you copy-paste, refactor it."
            "Version control everything. Even config files."
            "Read error messages carefully. They usually tell you exactly what's wrong."
            "Use a linter. It catches mistakes before they become bugs."
            "Document why, not what. Code should be self-explanatory."
            "Premature optimization is the root of all evil. Make it work first, then make it fast."
            "Take breaks. Fresh eyes catch bugs tired eyes miss."
            "Learn keyboard shortcuts. They save hours over time."
            "Use git branches. Never commit directly to main."
            "Write commit messages that explain WHY, not WHAT."
            "Refactor regularly. Small refactors are better than big rewrites."
            "Use a debugger instead of print statements. It's faster."
            "Keep dependencies updated. Security patches matter."
            "Use environment variables for secrets. Never hardcode them."
            "Write documentation as you go. Don't leave it for later."
            "Use code review. A second pair of eyes catches more bugs."
            "Learn to say 'I don't know'. It's the first step to learning."
          )

          TIP_INDEX=$((DAY_NUM % ${#TIPS[@]}))
          TIP="${TIPS[$TIP_INDEX]}"

          # Create log entry
          mkdir -p logs
          cat > "logs/${TODAY}.md" << EOF
          # Day ${DAY_NUM} of ${YEAR} - ${TODAY}

          **Commit #:** ${TOTAL}
          **Month:** ${MONTH}

          ---

          ## Daily Tip

          > ${TIP}

          ---

          *Auto-generated by GitHub Actions*
          EOF

      - name: Commit and push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add -A
          git diff --cached --quiet || git commit -m "📊 Daily contribution #$(git rev-list --count HEAD 2>/dev/null || echo '1') - $(date +'%Y-%m-%d')"
          git push
