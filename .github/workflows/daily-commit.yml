name: Daily Contribution

on:
  schedule:
    - cron: '0 12 * * *'
  workflow_dispatch:

jobs:
  contribute:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Generate daily content
        run: |
          TODAY=$(date +"%Y-%m-%d")
          DAY_NUM=$(date +"%j")
          YEAR=$(date +"%Y")
          MONTH=$(date +"%B")
          TOTAL=$(git rev-list --count HEAD 2>/dev/null || echo "0")
          TOTAL=$((TOTAL + 1))

          TIPS=(
            "Always write tests before writing code."
            "Use meaningful variable names."
            "Keep functions small and focused."
            "Don't repeat yourself (DRY)."
            "Version control everything."
            "Read error messages carefully."
            "Use a linter. It catches mistakes early."
            "Document why, not what."
            "Premature optimization is the root of all evil."
            "Take breaks. Fresh eyes catch bugs."
            "Learn keyboard shortcuts."
            "Use git branches. Never commit to main directly."
            "Write commit messages that explain WHY."
            "Refactor regularly."
            "Use a debugger instead of print statements."
            "Keep dependencies updated."
            "Use environment variables for secrets."
            "Write documentation as you go."
            "Use code review."
            "Learn to say I don't know."
          )

          TIP_INDEX=$((DAY_NUM % ${#TIPS[@]}))
          TIP="${TIPS[$TIP_INDEX]}"

          mkdir -p logs

          echo "# Day ${DAY_NUM} of ${YEAR} - ${TODAY}" > "logs/${TODAY}.md"
          echo "" >> "logs/${TODAY}.md"
          echo "**Commit #:** ${TOTAL}" >> "logs/${TODAY}.md"
          echo "**Month:** ${MONTH}" >> "logs/${TODAY}.md"
          echo "" >> "logs/${TODAY}.md"
          echo "---" >> "logs/${TODAY}.md"
          echo "" >> "logs/${TODAY}.md"
          echo "## Daily Tip" >> "logs/${TODAY}.md"
          echo "" >> "logs/${TODAY}.md"
          echo "> ${TIP}" >> "logs/${TODAY}.md"
          echo "" >> "logs/${TODAY}.md"
          echo "---" >> "logs/${TODAY}.md"
          echo "" >> "logs/${TODAY}.md"
          echo "*Auto-generated by GitHub Actions*" >> "logs/${TODAY}.md"

      - name: Commit and push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add -A
          git diff --cached --quiet || git commit -m "Daily contribution #$(git rev-list --count HEAD 2>/dev/null || echo '1') - $(date +'%Y-%m-%d')"
          git push
